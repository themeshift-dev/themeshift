name: Sync main to develop

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Create or reuse main -> develop sync PR
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.AUTOMATION_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const base = 'develop';
            const head = `${owner}:main`;
            const title = 'chore: sync main into develop';
            const marker = '<!-- sync-main-to-develop -->';
            const body = `${marker}

            Automated PR to keep \`develop\` up to date with \`main\` after release merges and release-please commits.`;

            const openPulls = await github.paginate(github.rest.pulls.list, {
              owner,
              repo,
              state: 'open',
              base,
              head,
              per_page: 100,
            });

            const existing = openPulls.find((pull) =>
              (pull.body ?? '').includes(marker)
            );

            if (existing) {
              core.info(`Sync PR already open: #${existing.number}`);
              return;
            }

            try {
              const created = await github.rest.pulls.create({
                owner,
                repo,
                base,
                head,
                title,
                body,
                maintainer_can_modify: true,
              });

              core.info(`Created sync PR #${created.data.number}`);
            } catch (error) {
              if (
                error.status === 422 &&
                typeof error.message === 'string' &&
                error.message.includes('No commits between')
              ) {
                core.info('No commits to sync from main into develop.');
                return;
              }

              throw error;
            }
