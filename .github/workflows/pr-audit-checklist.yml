name: PR audit checklist

on:
  pull_request:
    branches:
      - develop
    types: [opened, edited, synchronize, reopened]

permissions:
  checks: write
  contents: read
  pull-requests: read
  statuses: write

jobs:
  checklist:
    runs-on: ubuntu-latest
    steps:
      - name: Detect component changes
        id: changed
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const pull_number = context.payload.pull_request?.number;

            if (!pull_number) {
              core.setOutput('components_changed', 'false');
              core.info('No pull request number found in context.');
              return;
            }

            const files = await github.paginate(
              github.rest.pulls.listFiles,
              {
                owner,
                repo,
                pull_number,
                per_page: 100,
              }
            );

            const componentsChanged = files.some((file) =>
              file.filename.startsWith('packages/ui/src/components/')
            );

            core.setOutput(
              'components_changed',
              componentsChanged ? 'true' : 'false'
            );
            core.info(`Components changed: ${componentsChanged}`);

      - name: Check PR task list
        if: steps.changed.outputs.components_changed == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.pull_request?.body ?? '';
            const sectionHeader = '# Component Library Audit Checklist';
            const sectionStart = body.indexOf(sectionHeader);

            if (sectionStart === -1) {
              core.setFailed(
                'Missing "Component Library Audit Checklist" section in PR body.'
              );
              return;
            }

            const checklistSection = body.slice(sectionStart);
            const taskLines = [
              ...checklistSection.matchAll(/^\s*-\s*\[( |x|X)\]\s+(.+)$/gm),
            ];

            if (taskLines.length === 0) {
              core.setFailed(
                'No checklist task items found under "Component Library Audit Checklist".'
              );
              return;
            }

            const unchecked = taskLines
              .filter(([, state]) => state === ' ')
              .map(([, , label]) => label.trim());

            if (unchecked.length > 0) {
              core.setFailed(
                `Audit checklist has ${unchecked.length} unchecked item(s):\n- ${unchecked.join('\n- ')}`
              );
              return;
            }

            core.info(
              `Audit checklist validation passed with ${taskLines.length} checked item(s).`
            );

      - name: Skip checklist when components are unchanged
        if: steps.changed.outputs.components_changed != 'true'
        run: echo "No component changes in packages/ui/src/components; skipping checklist enforcement."
