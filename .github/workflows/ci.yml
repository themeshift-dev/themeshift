name: CI

on:
  pull_request:
    branches:
      - develop
      - main
    types:
      - opened
      - reopened
      - synchronize
      - edited
  push:
    branches:
      - develop

jobs:
  conventions:
    if: ${{ github.event_name == 'pull_request' && (github.event.action != 'edited' || github.event.changes.title != null) }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.18.0

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Check PR branch name and title
        run: pnpm pr:check-conventions
        env:
          PR_BASE_BRANCH: ${{ github.base_ref }}
          PR_HEAD_BRANCH: ${{ github.head_ref }}
          PR_TITLE: ${{ github.event.pull_request.title }}

  validate:
    if: ${{ github.event_name != 'pull_request' || github.event.action != 'edited' }}
    runs-on: ubuntu-latest
    steps:
      # Clone repository into the runner workspace
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Set up pnpm for workspace installs and scripts
      - uses: pnpm/action-setup@v4
        with:
          version: 10.18.0

      # Set up Node.js using the repo version and enable pnpm caching
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      # Install workspace dependencies exactly as locked
      - run: pnpm install --frozen-lockfile

      # Confirm generated README badges match the current package surface
      - run: pnpm docs:check-badges

      - name: Configure Turborepo SCM range
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "TURBO_SCM_BASE=origin/${{ github.base_ref }}" >> "$GITHUB_ENV"
          else
            echo "TURBO_SCM_BASE=origin/develop" >> "$GITHUB_ENV"
          fi
          echo "TURBO_SCM_HEAD=HEAD" >> "$GITHUB_ENV"

      # Run the main validation pipeline used for pull requests and main
      - run: pnpm ci:validate

      # Build core + plugin packages so workspace consumers can resolve dist entrypoints during tests
      - run: pnpm --filter @themeshift/core build
      - run: pnpm --filter @themeshift/vite-plugin build

      # Generate UI package coverage output for Codecov
      - run: pnpm --filter @themeshift/ui test:coverage

      # Upload UI package coverage to Codecov
      - name: Upload UI coverage reports to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./packages/ui/coverage/lcov.info
          flags: ui

      # Generate plugin package coverage output for Codecov
      - run: pnpm --filter @themeshift/vite-plugin test:coverage

      # Upload plugin package coverage to Codecov
      - name: Upload vite-plugin coverage reports to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./packages/vite-plugin/coverage/lcov.info
          flags: vite-plugin
